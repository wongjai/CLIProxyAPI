name: Upstream Sync — Detect

# Pure upstream tracking: CLIProxyAPI carries no custom code anymore
# (embeddings moved to Aether). We deploy upstream's published Docker image
# (eceasy/cli-proxy-api:<tag>) directly — no git merge, no build.
# This job just compares the latest upstream tag against the version currently
# running on the VPS and, if newer, asks for Telegram approval to deploy.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Latest upstream tag
        id: upstream
        run: |
          UPSTREAM=$(git ls-remote --tags --refs \
            https://github.com/router-for-me/CLIProxyAPI.git 'v*' \
            | awk -F/ '{print $NF}' | sort -V | tail -1)
          echo "version=$UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "Latest upstream: $UPSTREAM"

      - name: Deployed version on VPS
        id: deployed
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p 28056 35.200.50.7 >> ~/.ssh/known_hosts 2>/dev/null
          IMG=$(ssh -p 28056 -i ~/.ssh/vps_key -o ConnectTimeout=15 root@35.200.50.7 \
            "docker inspect --format '{{.Config.Image}}' cli-proxy-api 2>/dev/null || true")
          CURRENT="${IMG##*:}"
          [ -z "$CURRENT" ] && CURRENT="unknown"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Deployed on VPS: $CURRENT (image: $IMG)"

      - name: Compare
        id: check
        env:
          CURRENT: ${{ steps.deployed.outputs.version }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date at $CURRENT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "New version available: $CURRENT → $UPSTREAM"
          fi

      - name: Collect changelog
        id: changelog
        if: steps.check.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT: ${{ steps.deployed.outputs.version }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          : > /tmp/changelog.txt
          case "$CURRENT" in
            v*)
              gh api "repos/router-for-me/CLIProxyAPI/compare/${CURRENT}...${UPSTREAM}" \
                --jq '.commits[].commit.message | split("\n")[0]' 2>/dev/null \
                | head -15 > /tmp/changelog.txt || true
              ;;
          esac
          [ -s /tmp/changelog.txt ] || \
            echo "(release notes: https://github.com/router-for-me/CLIProxyAPI/releases)" > /tmp/changelog.txt

      - name: Notify — ready for approval
        if: steps.check.outputs.new == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CURRENT: ${{ steps.deployed.outputs.version }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg current "$CURRENT" \
            --arg version "$UPSTREAM" \
            --rawfile changelog /tmp/changelog.txt \
            '{
              chat_id: $chat_id,
              text: ("🔄 CLIProxyAPI " + $version + " available\n\nDeployed: " + $current + "\n\nChanges:\n" + $changelog),
              reply_markup: {
                inline_keyboard: [[
                  {text: "✅ Approve Deploy", callback_data: ("approve:" + $version)},
                  {text: "⏭ Skip", callback_data: ("skip:" + $version)}
                ]]
              }
            }' \
          | curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @-
