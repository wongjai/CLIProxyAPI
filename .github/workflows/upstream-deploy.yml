name: Upstream Sync — Deploy

# Triggered by the Cloudflare Worker (Telegram "✅ Approve") via repository_dispatch.
# Deploys upstream's published image eceasy/cli-proxy-api:<version> to the VPS.
# No git checkout / merge / build / push — the VPS just pulls the pinned image
# through its local docker-compose-2.yml (which keeps the 127.0.0.1 bindings +
# external networks). client_payload.version is the upstream tag, e.g. v7.1.43.

on:
  repository_dispatch:
    types: [deploy-upstream]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ github.event.client_payload.version }}
    steps:
      - name: Deploy to VPS (pull upstream image)
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p 28056 35.200.50.7 >> ~/.ssh/known_hosts 2>/dev/null

          IMG="eceasy/cli-proxy-api:${VERSION}"
          ssh -p 28056 -i ~/.ssh/vps_key -o ConnectTimeout=15 root@35.200.50.7 \
            "cd /home/docker/CLIProxyAPI && \
             CLI_PROXY_IMAGE=$IMG docker compose -f docker-compose-2.yml pull && \
             CLI_PROXY_IMAGE=$IMG docker compose -f docker-compose-2.yml up -d --remove-orphans && \
             docker image prune -f"

      - name: Verify deployment
        id: verify
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          RESULT=$(ssh -p 28056 -i ~/.ssh/vps_key -o ConnectTimeout=15 root@35.200.50.7 \
            'echo "=== Containers ===" && docker ps --format "{{.Names}}\t{{.Status}}" && echo "=== Image ===" && docker inspect --format "{{.Config.Image}}" cli-proxy-api && echo "=== Disk ===" && df -h / | tail -1')
          echo "$RESULT"
          echo "$RESULT" > /tmp/verify.txt

      - name: Notify success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg version "$VERSION" \
            --rawfile result /tmp/verify.txt \
            '{chat_id: $chat_id, text: ("✅ CLIProxyAPI " + $version + " deployed\n\n" + $result)}' \
          | curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @-

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg version "$VERSION" \
            '{chat_id: $chat_id, text: ("❌ CLIProxyAPI " + $version + " deploy FAILED\n\nCheck: https://github.com/wongjai/CLIProxyAPI/actions")}' \
          | curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @-
