# docker-compose for the embeddings-server variant.
#
# This file targets the simpler API-key mode (Generative Language API).
# For Vertex AI OAuth mode, see the commented block at the bottom of the
# service definition.
#
# Run from the repository root:
#   GCP_API_KEY=AIza... \
#   docker compose -f cmd/embeddings-server/docker-compose.yml up -d --build

services:
  embeddings-server:
    image: ${EMBED_IMAGE:-embeddings-server:latest}
    pull_policy: build
    build:
      context: ../..
      dockerfile: cmd/embeddings-server/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: embeddings-server
    environment:
      # Pass through whichever auth env you set on the host; the binary
      # picks the backend based on what is non-empty.
      GCP_API_KEY: ${GCP_API_KEY:-}
      GCP_SA_JSON_PATH: ${GCP_SA_JSON_PATH:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-us-central1}
      EMBED_MODEL_ID: ${EMBED_MODEL_ID:-}
      EMBED_DEFAULT_DIM: ${EMBED_DEFAULT_DIM:-}
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-../../config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-../../auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-../../logs}:/CLIProxyAPI/logs
      # For Vertex OAuth mode, uncomment the next line and set
      # GCP_SA_JSON_PATH (on the host AND container) to /secrets/vertex-sa.json:
      # - ${VERTEX_SA_FILE:-./vertex-sa.json}:/secrets/vertex-sa.json:ro
    restart: unless-stopped
