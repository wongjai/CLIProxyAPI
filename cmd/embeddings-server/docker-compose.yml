# docker-compose for the embeddings-server variant.
#
# Credentials are resolved at request time (priority order):
#   1. auths/*.json type=vertex   — Vertex SA JSON uploaded via the
#                                   management UI's Vertex AI page.
#   2. cfg.VertexCompatAPIKey     — `vertex-api-key:` in config.yaml
#                                   (third-party x-goog-api-key providers).
#   3. cfg.GeminiKey              — `gemini-api-key:` in config.yaml.
#   4. env GCP_SA_JSON_PATH (+ GCP_PROJECT_ID, GCP_REGION) — env fallback.
#   5. env GCP_API_KEY                                     — env fallback.
#
# The binary boots without any credentials configured; /v1/embeddings
# returns 503 with a clear message until creds appear (either via the
# management UI editing config.yaml / writing auth files, or via env).
#
# Simplest run — let the management UI configure everything:
#   docker compose -f cmd/embeddings-server/docker-compose.yml up -d --build

services:
  embeddings-server:
    image: ${EMBED_IMAGE:-embeddings-server:latest}
    pull_policy: build
    build:
      context: ../..
      dockerfile: cmd/embeddings-server/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: embeddings-server
    environment:
      # Pass through whichever auth env you set on the host; the binary
      # picks the backend based on what is non-empty.
      GCP_API_KEY: ${GCP_API_KEY:-}
      GCP_SA_JSON_PATH: ${GCP_SA_JSON_PATH:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-us-central1}
      EMBED_MODEL_ID: ${EMBED_MODEL_ID:-}
      EMBED_DEFAULT_DIM: ${EMBED_DEFAULT_DIM:-}
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-../../config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-../../auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-../../logs}:/CLIProxyAPI/logs
      # For Vertex OAuth mode, uncomment the next line and set
      # GCP_SA_JSON_PATH (on the host AND container) to /secrets/vertex-sa.json:
      # - ${VERTEX_SA_FILE:-./vertex-sa.json}:/secrets/vertex-sa.json:ro
    restart: unless-stopped
